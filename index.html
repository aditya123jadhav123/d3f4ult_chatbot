<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrivaSync Intelligence</title>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --bg: #f8fafc;
            --text: #334155;
            --user-msg: #e0f2fe;
            --bot-msg: #ffffff;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .container { width: 100%; max-width: 450px; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; display: flex; flex-direction: column; max-height: 90vh; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; font-weight: 600; font-size: 1.2rem; display: flex; justify-content: space-between; align-items: center; }
        
        /* Auth Styles */
        .auth-wrapper { padding: 30px; }
        .auth-wrapper input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem; outline: none; transition: border 0.2s; }
        .auth-wrapper input:focus { border-color: var(--accent); }
        .btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; font-weight: 500; transition: background 0.2s; }
        .btn:hover { background: #2563eb; }
        .btn:disabled { background: #94a3b8; cursor: not-allowed; }
        .toggle-link { text-align: center; margin-top: 15px; font-size: 0.9rem; color: var(--accent); cursor: pointer; }
        .error-msg { color: #ef4444; font-size: 0.85rem; margin-bottom: 10px; text-align: center; height: 20px; }
        .success-msg { color: #10b981; font-size: 0.85rem; margin-bottom: 10px; text-align: center; height: 20px; }

        /* Chat Styles */
        .chat-wrapper { display: none; flex-direction: column; height: 600px; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; background: var(--bg); display: flex; flex-direction: column; gap: 12px; }
        .message { padding: 12px 16px; border-radius: 8px; max-width: 85%; line-height: 1.5; font-size: 0.95rem; word-wrap: break-word; }
        .user-message { background: var(--user-msg); color: #0369a1; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot-message { background: var(--bot-msg); border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.02); }
        
        .input-area { padding: 15px; background: white; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .input-area input { flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 6px; outline: none; }
        .send-btn { background: var(--accent); color: white; border: none; padding: 0 20px; border-radius: 6px; cursor: pointer; font-weight: 500; }
        .logout-btn { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        
        .hidden { display: none !important; }
        .typing { font-style: italic; color: #64748b; font-size: 0.85rem; padding: 0 20px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="auth-view">
            <div class="header">PrivaSync Access</div>
            <div class="auth-wrapper">
                <div id="status-msg" class="error-msg"></div>
                <input type="text" id="name" placeholder="Full Name (Required for Signup)" class="hidden">
                <input type="email" id="email" placeholder="Email Address">
                <input type="password" id="password" placeholder="Password">
                <button class="btn" id="submit-btn" onclick="handleAuth()">Login</button>
                <div class="toggle-link" onclick="toggleMode()" id="toggle-text">New user? Create an account</div>
            </div>
        </div>

        <div id="chat-view" class="chat-wrapper">
            <div class="header">
                PrivaSync <span id="user-display" style="font-size:0.8rem; opacity: 0.8;"></span>
                <button class="logout-btn" onclick="logout()">Disconnect</button>
            </div>
            <div class="chat-box" id="chat-box">
                <div class="message bot-message">System online. Secure connection established. How can I assist you?</div>
            </div>
            <div id="typing-indicator" class="typing hidden">Gemini is processing...</div>
            <div class="input-area">
                <input type="text" id="chat-input" placeholder="Type a message..." onkeypress="handleEnter(event)">
                <button class="send-btn" id="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        // State
        let isSignup = false;
        const API_URL = 'http://localhost:5000/api';

        // Initialization
        window.onload = () => {
            const token = localStorage.getItem('privasync_token');
            const userName = localStorage.getItem('privasync_user');
            if (token) {
                document.getElementById('user-display').innerText = `(${userName})`;
                switchView('chat');
            }
        };

        // UI Helpers
        const setStatus = (msg, isError = true) => {
            const el = document.getElementById('status-msg');
            el.innerText = msg;
            el.className = isError ? 'error-msg' : 'success-msg';
            setTimeout(() => el.innerText = '', 4000);
        };

        const switchView = (view) => {
            if (view === 'chat') {
                document.getElementById('auth-view').classList.add('hidden');
                document.getElementById('chat-view').style.display = 'flex';
            } else {
                document.getElementById('auth-view').classList.remove('hidden');
                document.getElementById('chat-view').style.display = 'none';
            }
        };

        // Auth Logic
        const toggleMode = () => {
            isSignup = !isSignup;
            document.getElementById('name').classList.toggle('hidden', !isSignup);
            document.getElementById('submit-btn').innerText = isSignup ? 'Create Account' : 'Secure Login';
            document.getElementById('toggle-text').innerText = isSignup ? 'Already have an account? Login' : 'New user? Create an account';
            document.getElementById('status-msg').innerText = '';
        };

        async function handleAuth() {
            const btn = document.getElementById('submit-btn');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value.trim();

            if (!email || !password || (isSignup && !name)) {
                return setStatus("Please fill all required fields.");
            }

            btn.disabled = true;
            btn.innerText = "Processing...";

            const endpoint = isSignup ? '/auth/signup' : '/auth/login';
            const payload = isSignup ? { name, email, password } : { email, password };

            try {
                const response = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) throw new Error(data.error || 'Authentication failed');

                if (isSignup) {
                    setStatus(data.message, false);
                    toggleMode(); // Switch to login
                } else {
                    localStorage.setItem('privasync_token', data.token);
                    localStorage.setItem('privasync_user', data.user.name);
                    document.getElementById('user-display').innerText = `(${data.user.name})`;
                    switchView('chat');
                }
            } catch (err) {
                setStatus(err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = isSignup ? 'Create Account' : 'Secure Login';
            }
        }

        // Chat Logic
        const handleEnter = (e) => { if (e.key === 'Enter') sendMessage(); };

        async function sendMessage() {
            const inputEl = document.getElementById('chat-input');
            const text = inputEl.value.trim();
            if (!text) return;

            appendMessage(text, 'user-message');
            inputEl.value = '';
            
            const btn = document.getElementById('send-btn');
            const typing = document.getElementById('typing-indicator');
            
            btn.disabled = true;
            typing.classList.remove('hidden');

            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-auth-token': localStorage.getItem('privasync_token')
                    },
                    body: JSON.stringify({ prompt: text })
                });

                const data = await response.json();
                
                if (response.status === 401) {
                    logout();
                    alert("Session expired. Please login again.");
                    return;
                }
                
                if (!response.ok) throw new Error(data.error || 'Failed to get response');
                
                appendMessage(data.text, 'bot-message');
            } catch (err) {
                appendMessage(`Error: ${err.message}`, 'bot-message');
            } finally {
                btn.disabled = false;
                typing.classList.add('hidden');
                inputEl.focus();
            }
        }

        function appendMessage(text, className) {
            const box = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.innerText = text;
            box.appendChild(msgDiv);
            box.scrollTop = box.scrollHeight;
        }

        function logout() {
            localStorage.removeItem('privasync_token');
            localStorage.removeItem('privasync_user');
            location.reload();
        }
    </script>
</body>
</html>
